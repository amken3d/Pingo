<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- QFN-56 Package (RP2040) — 14 pads per side -->

  <!-- Package body -->
  <rect x="15" y="15" width="70" height="70" fill="#2d2d2d" rx="2"/>

  <!-- Exposed ground pad -->
  <rect x="32" y="32" width="36" height="36" fill="#888" rx="1" opacity="0.2"/>

  <!-- Pin 1 marker (chamfer + dot) -->
  <circle cx="20" cy="20" r="2" fill="none" stroke="#ccc" stroke-width="0.8"/>

  <!-- Chip label -->
  <text x="50" y="48" text-anchor="middle" dominant-baseline="middle"
        fill="#aaa" font-family="sans-serif" font-size="8" font-weight="bold">RP2040</text>
  <text x="50" y="58" text-anchor="middle" dominant-baseline="middle"
        fill="#777" font-family="sans-serif" font-size="4.5">QFN-56</text>

  <!-- Top pads: 14 pads, dash=3 gap=2, line length=68 -->
  <line x1="16" y1="11" x2="84" y2="11"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="3 2" stroke-linecap="butt"/>
  <!-- Bottom pads -->
  <line x1="16" y1="89" x2="84" y2="89"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="3 2" stroke-linecap="butt"/>
  <!-- Left pads -->
  <line x1="11" y1="16" x2="11" y2="84"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="3 2" stroke-linecap="butt"/>
  <!-- Right pads -->
  <line x1="89" y1="16" x2="89" y2="84"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="3 2" stroke-linecap="butt"/>

  <!-- Pin 1 indicator on top-left pad -->
  <circle cx="17.5" cy="7" r="1.2" fill="#c8a951"/>
</svg>
