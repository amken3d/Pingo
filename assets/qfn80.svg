<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- QFN-80 Package (RP2350B) — 20 pads per side -->

  <!-- Package body -->
  <rect x="15" y="15" width="70" height="70" fill="#2d2d2d" rx="2"/>

  <!-- Exposed ground pad -->
  <rect x="30" y="30" width="40" height="40" fill="#888" rx="1" opacity="0.2"/>

  <!-- Pin 1 marker -->
  <circle cx="20" cy="20" r="2" fill="none" stroke="#ccc" stroke-width="0.8"/>

  <!-- Chip label -->
  <text x="50" y="48" text-anchor="middle" dominant-baseline="middle"
        fill="#aaa" font-family="sans-serif" font-size="7.5" font-weight="bold">RP2350B</text>
  <text x="50" y="58" text-anchor="middle" dominant-baseline="middle"
        fill="#777" font-family="sans-serif" font-size="4.5">QFN-80</text>

  <!-- Top pads: 20 pads, dash=2.5 gap=1, line length=69, from 15.5 to 84.5 -->
  <line x1="15.5" y1="11" x2="84.5" y2="11"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="2.5 1" stroke-linecap="butt"/>
  <!-- Bottom pads -->
  <line x1="15.5" y1="89" x2="84.5" y2="89"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="2.5 1" stroke-linecap="butt"/>
  <!-- Left pads -->
  <line x1="11" y1="15.5" x2="11" y2="84.5"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="2.5 1" stroke-linecap="butt"/>
  <!-- Right pads -->
  <line x1="89" y1="15.5" x2="89" y2="84.5"
        stroke="#c8a951" stroke-width="8" stroke-dasharray="2.5 1" stroke-linecap="butt"/>

  <!-- Pin 1 indicator -->
  <circle cx="16.75" cy="7" r="1" fill="#c8a951"/>
</svg>
